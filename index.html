      wrap.innerHTML = '<div class="empty"><h3>Noch keine Aufträge</h3>' +
        '<p>Setz einen Lead auf "Gewonnen" — er landet dann automatisch hier. Oder leg einen Auftrag manuell an.</p>' +
        '<div style="display:flex; justify-content:center; margin-top:14px;">' +
        '<button class="btn btn-primary" id="emptyNewOrder">+ Auftrag manuell anlegen</button></div></div>';
      var btn = document.getElementById('emptyNewOrder');
      if (btn) btn.addEventListener('click', openNewOrderModal);
    } else if (activeCount === 0 && !activeAuftragFilter && !auftragSearchTerm){
      wrap.innerHTML = '<div class="empty"><h3>Alles erledigt 🎉</h3><p>Alle Aufträge sind vollständig abgeschlossen.</p></div>';
    } else if (filtered.length === 0){
      wrap.innerHTML = '<div class="empty"><h3>Keine Treffer</h3><p>Keine Aufträge entsprechen den aktuellen Filtern.</p></div>';
    } else {
      var groups = groupOrdersByCustomer(filtered);
      wrap.innerHTML =
        '<table><thead><tr><th>Kunde</th><th>Fahrzeug</th><th>Zahlungsart</th><th>Status</th><th>Fortschritt</th><th></th></tr></thead>' +
        '<tbody>' + groups.map(orderRowHtml).join('') + '</tbody></table>';
      document.querySelectorAll('#auftragWrap tr.row').forEach(function(tr){
        tr.addEventListener('click', function(){
          var key = tr.getAttribute('data-gkey');
          var g = groups.find(function(x){ return x.key === key; });
          if (!g) return;
          if (g.orders.length > 1){
            expandedOrderId = (expandedOrderId === key) ? null : key;
            renderOrders();
          } else {
            openOrderDetailModal(g.orders[0].id);
          }
        });
      });
      document.querySelectorAll('#auftragWrap [data-vehicleoid]').forEach(function(row){
        row.addEventListener('click', function(e){
          e.stopPropagation();
          openOrderDetailModal(row.getAttribute('data-vehicleoid'));
        });
      });
    }
  }

  function openConfirmModal(opts){
    var html = '<div class="modal-overlay" id="overlay"><div class="modal" style="max-width:420px;">' +
      '<h2>' + opts.title + '</h2>' +
      '<p style="font-size:13.5px; color:var(--ink); line-height:1.5; margin-top:-6px;">' + opts.message + '</p>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" id="cm_cancel">' + (opts.cancelLabel || 'Abbrechen') + '</button>' +
        '<button class="btn btn-primary" id="cm_confirm">' + (opts.confirmLabel || 'Bestätigen') + '</button>' +
      '</div>' +
    '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
    var done = false;
    function finish(result){
      if (done) return;
      done = true;
      closeModal();
      if (result && opts.onConfirm) opts.onConfirm();
      if (!result && opts.onCancel) opts.onCancel();
    }
    document.getElementById('cm_cancel').addEventListener('click', function(){ finish(false); });
    document.getElementById('overlay').addEventListener('click', function(e){ if (e.target.id === 'overlay') finish(false); });
    document.getElementById('cm_confirm').addEventListener('click', function(){ finish(true); });
  }

  function applyOrderStepChange(order, step, checked){
    order[step.key] = checked;
    if (step.hasDate){
      if (checked && !order[step.key + 'Datum']) order[step.key + 'Datum'] = todayISO();
      if (!checked) order[step.key + 'Datum'] = '';
    }
    addOrderHistory(order, (checked ? 'Erledigt: ' : 'Zurückgesetzt: ') + step.label);
  }

  function autoCompleteSteps(order, steps){
    steps.forEach(function(step){
      if (!order[step.key]) applyOrderStepChange(order, step, true);
    });
  }

  function wireSnapshotEditButton(snapshotBox, order, refresh){
    var editBtn = snapshotBox.querySelector('#od_snapshot_edit');
    if (!editBtn) return;
    editBtn.addEventListener('click', function(){
      snapshotBox.innerHTML = renderSnapshotEditForm(order);
      snapshotBox.querySelector('#od_snap_cancel').addEventListener('click', function(){
        snapshotBox.innerHTML = renderSnapshotView(order);
        wireSnapshotEditButton(snapshotBox, order, refresh);
      });
      snapshotBox.querySelector('#od_snap_save').addEventListener('click', function(){
        order.kunde = snapshotBox.querySelector('#od_snap_kunde').value.trim() || order.kunde;
        addOrderHistory(order, 'Kundenname aktualisiert');
        persistOrders();
        showToast('Kundenname gespeichert');
        refresh();
      });
    });
  }

  function wireOrderDetail(detailRow, refresh){
    refresh = refresh || renderOrders;
    var id = detailRow.getAttribute('data-odetail-for');
    var order = orders.find(function(o){ return o.id === id; });
    detailRow.addEventListener('click', function(e){ e.stopPropagation(); });

    var snapshotBox = detailRow.querySelector('#od_snapshot');
    if (snapshotBox) wireSnapshotEditButton(snapshotBox, order, refresh);

    detailRow.querySelectorAll('[data-step]').forEach(function(cb){
      cb.addEventListener('change', function(){
        var key = cb.getAttribute('data-step');
        var step = ORDER_STEPS.find(function(s){ return s.key === key; });
        var wantsChecked = cb.checked;

        // Fall: "Auslieferungstermin festgelegt" wird angehakt -> bestätigen, dann ALLE Punkte abhaken
        if (key === 'fahrzeugAusgeliefert' && wantsChecked){
          cb.checked = false; // visuell zurücksetzen bis bestätigt
          openConfirmModal({
            title:'Fahrzeug ausliefern?',
            message:'Ist das Fahrzeug fertig und wird jetzt ausgeliefert? Alle übrigen Checklisten-Punkte werden automatisch mit abgehakt.',
            confirmLabel:'Ja, ausgeliefert',
            cancelLabel:'Noch nicht',
            onConfirm:function(){
              autoCompleteSteps(order, relevantSteps(order));
              persistOrders();
              ORDER_STEPS.filter(function(s){ return s.assignable; }).forEach(function(s){ syncStepTodo(order, s.key); });
              showToast('Ausgeliefert — Auftrag abgeschlossen');
              generateNachkaufTodos();
              refresh();
            }
          });
          return;
        }

        // Standardfall: normales Ab-/Anhaken ohne Rückfrage
        applyOrderStepChange(order, step, wantsChecked);
        persistOrders();
        if (step && step.assignable){
          syncStepTodo(order, key);
        }
        if (computeOrderProgress(order).percent === 100){
          showToast('Auftrag abgeschlossen');
        }
        refresh();
      });
    });
    detailRow.querySelectorAll('[data-datefor]').forEach(function(inp){
      inp.addEventListener('change', function(){
        order[inp.getAttribute('data-datefor') + 'Datum'] = inp.value;
        // wird erst mit 'Änderungen speichern' persistiert
      });
    });
    detailRow.querySelectorAll('[data-stepassignee]').forEach(function(sel){
      sel.addEventListener('click', function(e){ e.stopPropagation(); });
      sel.addEventListener('change', function(){
        var key = sel.getAttribute('data-stepassignee');
        order.stepAssignee = order.stepAssignee || {};
        order.stepAssignee[key] = sel.value;
        persistOrders();
        syncStepTodo(order, key);
        showToast(sel.value ? 'Zuständig: ' + sel.value + ' — als To-Do angelegt' : 'Zuständigkeit entfernt');
      });
    });
    detailRow.querySelectorAll('[data-ofield]').forEach(function(el){
      if (el.getAttribute('data-ofield') === 'newnote') return;
      el.addEventListener('change', function(){
        var field = el.getAttribute('data-ofield');
        order[field] = (field === 'eigenzulassung' || field === 'inzahlungnahme') ? (el.value === 'true') : el.value;
        // wird erst mit 'Änderungen speichern' persistiert
      });
    });
    var saveFieldsBtn = detailRow.querySelector('[data-oaction="savefields"]');
    saveFieldsBtn.addEventListener('click', function(){
      addOrderHistory(order, 'Zahlungs- und Datumsangaben aktualisiert');
      persistOrders();
      generateLeasingTodos();
      showToast('Änderungen gespeichert');
      refresh();
    });
    var noteBtn = detailRow.querySelector('[data-oaction="addnote"]');
    noteBtn.addEventListener('click', function(){
      var ta = detailRow.querySelector('[data-ofield="newnote"]');
      if (!ta.value.trim()) return;
      addOrderHistory(order, ta.value.trim());
      persistOrders();
      refresh();
      showToast('Notiz hinzugefügt');
    });
    var delBtn = detailRow.querySelector('[data-oaction="delete"]');
    delBtn.addEventListener('click', function(){
      if (confirm('Diesen Auftrag unwiderruflich löschen?')){
        orders = orders.filter(function(o){ return o.id !== id; });
        expandedOrderId = null;
        persistOrders();
        refresh();
        showToast('Auftrag gelöscht');
      }
    });
  }

  function findLeadByExactName(name){
    var key = (name || '').trim().toLowerCase();
    if (!key) return null;
    // Bei mehreren Treffern den zuletzt angelegten nehmen
    var matches = leads.filter(function(l){ return (l.name || '').trim().toLowerCase() === key; });
    matches.sort(function(a,b){ return (b.erstelltAm||'').localeCompare(a.erstelltAm||''); });
    return matches[0] || null;
  }

  function openNewOrderModal(prefill){
    prefill = prefill || {};
    var html = '<div class="modal-overlay" id="overlay"><div class="modal">' +
      '<h2>Auftrag anlegen</h2>' +
      '<div class="field-grid">' +
        '<div class="field full" style="position:relative;"><label>Kunde *</label><input type="text" id="om_kunde" autocomplete="off" value="' + escapeHtml(prefill.kunde||'') + '">' +
          '<div id="om_kunde_suggestions" class="name-suggestions"></div></div>' +
        '<div class="field"><label>Fahrzeug *</label><input type="text" id="om_fahrzeug" value="' + escapeHtml(prefill.fahrzeug||'') + '"></div>' +
        '<div class="field"><label>Kategorie</label><select id="om_kategorie">' +
          '<option value="privat"' + (prefill.kategorie!=='gewerbe'?' selected':'') + '>Privatkunde</option>' +
          '<option value="gewerbe"' + (prefill.kategorie==='gewerbe'?' selected':'') + '>Gewerbekunde</option>' +
        '</select></div>' +
        '<div class="field"><label>Fahrzeugtyp</label><select id="om_fahrzeugtyp">' +
          Object.keys(FAHRZEUGTYPEN).map(function(k){ return '<option value="' + k + '"' + ((prefill.fahrzeugtyp||'neu')===k?' selected':'') + '>' + FAHRZEUGTYPEN[k] + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>Zahlungsart</label><select id="om_zahlungsart">' +
          Object.keys(ZAHLUNGSARTEN).map(function(k){ return '<option value="' + k + '">' + ZAHLUNGSARTEN[k] + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>Eigenzulassung</label><select id="om_eigenzulassung">' +
          '<option value="false">Nein</option><option value="true">Ja</option>' +
        '</select></div>' +
        '<div class="field"><label>Inzahlungnahme</label><select id="om_inzahlungnahme">' +
          '<option value="false">Nein</option><option value="true">Ja</option>' +
        '</select></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" id="om_cancel">Abbrechen</button>' +
        '<button class="btn btn-primary" id="om_save">Anlegen</button>' +
      '</div>' +
    '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
    document.getElementById('om_cancel').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', function(e){ if (e.target.id === 'overlay') closeModal(); });

    var kundeInput = document.getElementById('om_kunde');
    var suggestBox = document.getElementById('om_kunde_suggestions');
    var matchedLead = prefill.leadId ? (leads.find(function(l){ return l.id === prefill.leadId; }) || null) : null;

    function applyMatch(lead){
      matchedLead = lead;
      kundeInput.value = lead.name;
      document.getElementById('om_kategorie').value = lead.kategorie || 'privat';
      document.getElementById('om_fahrzeugtyp').value = lead.fahrzeugtyp || 'gebraucht';
    }

    kundeInput.addEventListener('input', function(e){
      matchedLead = null; // getippter Name weicht vom zuletzt ausgewählten Vorschlag ab
      var typed = e.target.value.trim();
      if (typed.length < 2){ suggestBox.classList.remove('show'); suggestBox.innerHTML = ''; return; }
      var seen = {};
      var matches = leads.filter(function(l){
        var name = (l.name || '').trim();
        if (!name || name.toLowerCase().indexOf(typed.toLowerCase()) === -1) return false;
        var key = name.toLowerCase();
        if (seen[key]) return false; // pro Name nur ein Vorschlag (jeweils neuester Lead via findLeadByExactName)
        seen[key] = true;
        return true;
      }).slice(0, 5);
      if (matches.length === 0){ suggestBox.classList.remove('show'); suggestBox.innerHTML = ''; return; }
      suggestBox.innerHTML = matches.map(function(l){
        var vehicleCount = orders.filter(function(o){ return o.leadId === l.id; }).length;
        var sub = (l.kategorie === 'gewerbe' ? 'Gewerbekunde' : 'Privatkunde') +
          (vehicleCount > 0 ? ' · ' + vehicleCount + ' Fahrzeug' + (vehicleCount===1?'':'e') : ' · noch kein Fahrzeug');
        return '<div class="name-suggestion-item" data-leadid="' + l.id + '">' + escapeHtml(l.name) +
          '<div class="ns-meta">' + sub + '</div></div>';
      }).join('');
      suggestBox.classList.add('show');
      suggestBox.querySelectorAll('[data-leadid]').forEach(function(item){
        item.addEventListener('click', function(){
          var lead = leads.find(function(l){ return l.id === item.getAttribute('data-leadid'); });
          suggestBox.classList.remove('show');
          suggestBox.innerHTML = '';
          if (lead) applyMatch(lead);
        });
      });
    });
    kundeInput.addEventListener('blur', function(){
      setTimeout(function(){ suggestBox.classList.remove('show'); }, 150);
    });

    document.getElementById('om_save').addEventListener('click', function(){
      var kunde = kundeInput.value.trim();
      var fahrzeug = document.getElementById('om_fahrzeug').value.trim();
      if (!kunde || !fahrzeug){ showToast('Kunde und Fahrzeug sind erforderlich'); return; }
      // Falls kein Vorschlag angeklickt wurde, aber der eingegebene Name exakt zu einem bestehenden Kunden passt:
      // trotzdem denselben Kunden verwenden statt einen doppelten Lead anzulegen
      var lead = (matchedLead && matchedLead.name.trim().toLowerCase() === kunde.toLowerCase())
        ? matchedLead
        : findLeadByExactName(kunde);
      var kategorie = document.getElementById('om_kategorie').value;
      var fahrzeugtyp = document.getElementById('om_fahrzeugtyp').value;
      var zahlungsart = document.getElementById('om_zahlungsart').value;
      var eigenzulassung = document.getElementById('om_eigenzulassung').value === 'true';
      var inzahlungnahme = document.getElementById('om_inzahlungnahme').value === 'true';

      function finalizeOrder(linkedLead){
        var pseudo = linkedLead
          ? Object.assign({}, linkedLead, { name:kunde, fahrzeug:fahrzeug, kategorie:kategorie, fahrzeugtyp:fahrzeugtyp })
          : { id:null, name:kunde, fahrzeug:fahrzeug, zustaendig:prefill.zustaendig||'', kategorie:kategorie, fahrzeugtyp:fahrzeugtyp };
        var order = createOrderFromLead(pseudo, zahlungsart);
        order.eigenzulassung = eigenzulassung;
        order.inzahlungnahme = inzahlungnahme;
        persistOrders();
        renderOrders();
        closeModal();
        showToast('Auftrag angelegt — als Gewonnen erfasst');
      }

      if (lead){
        if (lead.status !== 'gewonnen'){
          lead.status = 'gewonnen';
          addHistory(lead, 'Status geändert: Gewonnen (über manuell angelegten Auftrag)');
          persist().then(function(){ finalizeOrder(lead); });
        } else {
          finalizeOrder(lead);
        }
      } else {
        createLead({
          name:kunde, kategorie:kategorie, fahrzeugtyp:fahrzeugtyp,
          fahrzeug:fahrzeug, quelle:'sonstiges', status:'gewonnen', erstkontakt:todayISO(), wiedervorlage:'', zustaendig:''
        }, { skipAutoOrder:true }).then(function(){
          finalizeOrder(leads[0]);
        });
      }
    });
  }

  var NACHKAUF_TAGE = 14;

  function stepTodoLabel(order, stepKey){
    var step = ORDER_STEPS.find(function(s){ return s.key === stepKey; });
    return (order.kunde || 'Kunde') + ' – ' + (step ? step.label : stepKey);
  }

  function syncStepTodo(order, stepKey){
    var assignedTo = (order.stepAssignee && order.stepAssignee[stepKey]) || '';
    var existing = todos.find(function(t){ return t.source === 'step' && t.orderId === order.id && t.stepKey === stepKey; });
    var checked = !!order[stepKey];

    if (!assignedTo || checked){
      // Kein Zuständiger mehr zugewiesen, oder Punkt bereits erledigt -> zugehöriges To-Do entfernen
      if (existing){
        if (todoRemovalTimers[existing.id]){ clearTimeout(todoRemovalTimers[existing.id]); delete todoRemovalTimers[existing.id]; }
        todos = todos.filter(function(t){ return t.id !== existing.id; });
        persistTodos();
      }
      return;
    }
    if (existing){
      existing.assignedTo = assignedTo;
      existing.title = stepTodoLabel(order, stepKey);
      persistTodos();
    } else {
      todos.push({
        id: uid(), title: stepTodoLabel(order, stepKey), assignedTo: assignedTo,
        dueDate:'', done:false, source:'step', orderId:order.id, stepKey:stepKey,
        erstelltAm: new Date().toISOString()
      });
      persistTodos();
    }
  }

  var ESKALATION_TAGE = 2;

  function generateEskalationTodos(){
    if (!loaded || !todosLoaded) return;
    var changed = false;
    leads.forEach(function(l){
      var shouldExist = l.status !== 'gewonnen' && l.status !== 'verloren' &&
        l.wiedervorlage && addDaysISO(l.wiedervorlage, ESKALATION_TAGE) <= todayISO() &&
        l.eskalationAckWiedervorlage !== l.wiedervorlage;
      var existing = todos.find(function(t){ return t.source === 'eskalation' && t.leadId === l.id; });
      if (shouldExist && !existing){
        todos.push({
          id: uid(), title: 'Nachfassen: ' + (l.name || 'Lead'), assignedTo:'',
          dueDate:'', done:false, source:'eskalation', leadId:l.id, erstelltAm: new Date().toISOString()
        });
        changed = true;
      } else if (!shouldExist && existing){
        if (todoRemovalTimers[existing.id]){ clearTimeout(todoRemovalTimers[existing.id]); delete todoRemovalTimers[existing.id]; }
        todos = todos.filter(function(t){ return t.id !== existing.id; });
        changed = true;
      }
    });
    if (changed){
      persistTodos();
      if (currentView === 'todos') renderTodos();
    }
  }

  var LEASING_VORLAUF_MONATE = 3;

  function generateLeasingTodos(){
    if (!ordersLoaded || !todosLoaded) return;
    var changed = false;
    orders.forEach(function(o){
      var isLeasing = o.zahlungsart === 'leasing' && o.fahrzeugAusgeliefertDatum && !o.leasingauslaufErledigt;
      var already = todos.some(function(t){ return t.source === 'leasingauslauf' && t.orderId === o.id; });
      if (!isLeasing){
        return; // kein Leasingfahrzeug oder noch nicht ausgeliefert -> nichts zu tun
      }
      if (already) return;
      var laufzeit = parseInt(o.leasingLaufzeitMonate, 10) || 36;
      var leasingende = addMonthsISO(o.fahrzeugAusgeliefertDatum, laufzeit);
      var faelligAm = addMonthsISO(leasingende, -LEASING_VORLAUF_MONATE);
      todos.push({
        id: uid(), title: (o.kunde || 'Kunde') + ' – Leasingauslauf in 3 Monaten',
        assignedTo:'', dueDate: faelligAm, done:false, source:'leasingauslauf', orderId:o.id,
        kunde:o.kunde||'', erstelltAm: new Date().toISOString()
      });
      changed = true;
    });
    if (changed){
      persistTodos();
      if (currentView === 'todos') renderTodos();
    }
  }

  function generateNachkaufTodos(){
    if (!ordersLoaded || !todosLoaded) return;
    var changed = false;
    orders.forEach(function(o){
      if (!o.fahrzeugAusgeliefertDatum || o.nachkaufErledigt) return;
      var already = todos.some(function(t){ return t.source === 'nachkauf' && t.orderId === o.id; });
      if (already) return;
      var faelligAm = addDaysISO(o.fahrzeugAusgeliefertDatum, NACHKAUF_TAGE);
      var todo = {
        id: uid(),
        title: 'Nachkauftelefonat: ' + (o.kunde || 'Kunde'),
        assignedTo: '',
        dueDate: faelligAm,
        done: false,
        source: 'nachkauf',
        orderId: o.id,
        kunde: o.kunde || '',
        erstelltAm: new Date().toISOString()
      };
      todos.push(todo);
      changed = true;
    });
    if (changed){
      persistTodos();
      if (currentView === 'todos') renderTodos();
    }
  }

  function isTodoFaellig(t){
    return !t.done && t.dueDate && t.dueDate <= todayISO();
  }

  function todoDueClass(t){
    if (!t.dueDate) return '';
    if (t.dueDate < todayISO()) return 'due-overdue';
    if (t.dueDate === todayISO()) return 'due-today';
    return 'due-future';
  }

  function todoRowHtml(t){
    var dueHtml = (t.dueDate && (t.source === 'nachkauf' || t.source === 'leasingauslauf')) ? ' <span class="todo-due ' + todoDueClass(t) + '">' + fmtDate(t.dueDate) + '</span>' : '';
    var editable = t.source === 'manuell';
    return '<div class="todo-row' + (t.done?' done':'') + '" data-todoid="' + t.id + '">' +
      '<input type="checkbox" data-todocheck="' + t.id + '"' + (t.done?' checked':'') + '>' +
      '<span class="todo-text"' + (editable ? ' data-todoedit="' + t.id + '" style="cursor:text;" title="Klicken zum Bearbeiten"' : '') + '>' + escapeHtml(t.title) + dueHtml + '</span>' +
      '<button class="todo-del" data-tododel="' + t.id + '" title="Löschen">✕</button>' +
    '</div>';
  }

  function todoColumnHtml(columnKey, list){
    return list.map(todoRowHtml).join('') +
      '<input type="text" class="todo-newinput" placeholder="+ Stichpunkt hinzufügen …" data-todonew="' + escapeHtml(columnKey) + '">';
  }

  function renderTodos(){
    var wrap = document.getElementById('todosWrap');
    updateTodoTabBadge();
    if (!todosLoaded){ wrap.innerHTML = '<div class="loading">Lade To-Dos …</div>'; return; }
    var people = settings.zustaendige.slice();
    while (people.length < 2) people.push(null); // mindestens 2 Personen-Spalten, auch wenn (noch) niemand angelegt ist

    var sorted = todos.slice().sort(function(a,b){
      if (!!a.done !== !!b.done) return a.done ? 1 : -1;
      return (a.erstelltAm||'').localeCompare(b.erstelltAm||'');
    });

    var allgemein = sorted.filter(function(t){ return !t.assignedTo; });
    var cols = people.map(function(name, idx){
      var list = name ? sorted.filter(function(t){ return t.assignedTo === name; }) : [];
      var label = name || ('Person ' + (idx+1) + ' (nicht vergeben)');
      return '<div class="todo-col">' +
        '<h3>' + escapeHtml(label) + '</h3>' +
        todoColumnHtml(name || '', list) +
      '</div>';
    });

    var html =
      '<div class="todo-board" style="grid-template-columns:1fr; margin-bottom:14px;">' +
        '<div class="todo-col">' +
          '<h3>Allgemein</h3>' +
          todoColumnHtml('', allgemein) +
        '</div>' +
      '</div>' +
      '<div class="todo-board" style="grid-template-columns:repeat(' + people.length + ', 1fr);">' +
        cols.join('') +
      '</div>';
    wrap.innerHTML = html;

    wrap.querySelectorAll('[data-todocheck]').forEach(function(cb){
      cb.addEventListener('change', function(){
        var id = cb.getAttribute('data-todocheck');
        var t = todos.find(function(x){ return x.id === id; });
        if (!t) return;
        t.done = cb.checked;
        t.completedAm = cb.checked ? new Date().toISOString() : '';
        persistTodos();

        // Mit einem Checklisten-Punkt verknüpftes To-Do -> Punkt im Auftrag mit-erledigen
        if (t.source === 'step' && t.orderId && t.stepKey && cb.checked){
          var linkedOrder = orders.find(function(o){ return o.id === t.orderId; });
          if (linkedOrder && !linkedOrder[t.stepKey]){
            linkedOrder[t.stepKey] = true;
            if (ORDER_STEPS.find(function(s){ return s.key === t.stepKey; }).hasDate){
              linkedOrder[t.stepKey + 'Datum'] = todayISO();
            }
            addOrderHistory(linkedOrder, ORDER_STEPS.find(function(s){ return s.key === t.stepKey; }).label + ' erledigt (über To-Do)');
            persistOrders();
          }
        }

        // Automatisch erzeugte To-Dos: beim Erledigen dauerhaft am Auftrag/Lead vermerken,
        // damit sie nicht beim nächsten Sync sofort wieder neu angelegt werden
        if (cb.checked && t.source === 'nachkauf' && t.orderId){
          var nkOrder = orders.find(function(o){ return o.id === t.orderId; });
          if (nkOrder && !nkOrder.nachkaufErledigt){ nkOrder.nachkaufErledigt = true; persistOrders(); }
        }
        if (cb.checked && t.source === 'leasingauslauf' && t.orderId){
          var leaseOrder = orders.find(function(o){ return o.id === t.orderId; });
          if (leaseOrder && !leaseOrder.leasingauslaufErledigt){ leaseOrder.leasingauslaufErledigt = true; persistOrders(); }
        }
        if (cb.checked && t.source === 'eskalation' && t.leadId){
          var eskLead = leads.find(function(l){ return l.id === t.leadId; });
          if (eskLead){ eskLead.eskalationAckWiedervorlage = eskLead.wiedervorlage; persist(); }
        }
        if (!cb.checked){
          if (t.source === 'nachkauf' && t.orderId){
            var nkOrderUndo = orders.find(function(o){ return o.id === t.orderId; });
            if (nkOrderUndo && nkOrderUndo.nachkaufErledigt){ nkOrderUndo.nachkaufErledigt = false; persistOrders(); }
          }
          if (t.source === 'leasingauslauf' && t.orderId){
            var leaseOrderUndo = orders.find(function(o){ return o.id === t.orderId; });
            if (leaseOrderUndo && leaseOrderUndo.leasingauslaufErledigt){ leaseOrderUndo.leasingauslaufErledigt = false; persistOrders(); }
          }
          if (t.source === 'eskalation' && t.leadId){
            var eskLeadUndo = leads.find(function(l){ return l.id === t.leadId; });
            if (eskLeadUndo){ eskLeadUndo.eskalationAckWiedervorlage = ''; persist(); }
          }
        }

        if (todoRemovalTimers[id]){
          clearTimeout(todoRemovalTimers[id]);
          delete todoRemovalTimers[id];
        }
        if (cb.checked){
          todoRemovalTimers[id] = setTimeout(function(){
            delete todoRemovalTimers[id];
            todos = todos.filter(function(x){ return x.id !== id; });
            persistTodos();
            renderTodos();
          }, 2000);
        }
        renderTodos();
      });
    });
    wrap.querySelectorAll('[data-tododel]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-tododel');
        if (todoRemovalTimers[id]){ clearTimeout(todoRemovalTimers[id]); delete todoRemovalTimers[id]; }
        todos = todos.filter(function(x){ return x.id !== id; });
        persistTodos();
        renderTodos();
      });
    });
    wrap.querySelectorAll('[data-todoedit]').forEach(function(span){
      span.addEventListener('click', function(){
        var id = span.getAttribute('data-todoedit');
        var t = todos.find(function(x){ return x.id === id; });
        if (!t) return;
        var inp = document.createElement('input');
        inp.type = 'text';
        inp.value = t.title;
        inp.className = 'todo-editinput';
        span.replaceWith(inp);
        inp.focus();
        inp.select();
        function commit(){
          var val = inp.value.trim();
          if (val && val !== t.title){
            t.title = val;
            persistTodos();
          }
          renderTodos();
        }
        inp.addEventListener('keydown', function(e){
          if (e.key === 'Enter') commit();
          if (e.key === 'Escape') renderTodos();
        });
        inp.addEventListener('blur', commit);
      });
    });
    wrap.querySelectorAll('[data-todonew]').forEach(function(inp){
      inp.addEventListener('keydown', function(e){
        if (e.key !== 'Enter') return;
        var text = inp.value.trim();
        if (!text) return;
        todos.push({
          id: uid(), title:text, assignedTo: inp.getAttribute('data-todonew') || '',
          dueDate:'', done:false, source:'manuell', erstelltAm: new Date().toISOString()
        });
        persistTodos();
        renderTodos();
        // Fokus auf das neue leere Eingabefeld derselben Spalte setzen, damit man direkt weiterschreiben kann
        requestAnimationFrame(function(){
          var sel = '[data-todonew="' + (inp.getAttribute('data-todonew') || '') + '"]';
          var newInp = wrap.querySelector(sel);
          if (newInp) newInp.focus();
        });
      });
    });
  }


  function renderStart(){
    var wrap = document.getElementById('startWrap');
    if (!loaded || !ordersLoaded || !todosLoaded){ wrap.innerHTML = '<div class="loading">Lade Übersicht …</div>'; return; }

    var stunde = new Date().getHours();
    var gruss = stunde < 11 ? 'Guten Morgen' : (stunde < 17 ? 'Guten Tag' : 'Guten Abend');
    var heuteText = new Date().toLocaleDateString('de-DE', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

    var offeneLeads = leads.filter(function(l){ return l.status !== 'gewonnen' && l.status !== 'verloren'; }).length;
    var faelligeWV = leads.filter(isOverdue).length;
    var aktiveAuftraege = orders.filter(function(o){ return computeOrderProgress(o).percent !== 100; }).length;
    var offeneTodosListe = todos.filter(function(t){ return !t.done; });
    var offeneTodos = offeneTodosListe.length;
    var todosAllgemein = offeneTodosListe.filter(function(t){ return !t.assignedTo; }).length;
    var todosByPerson = settings.zustaendige.map(function(name){
      return { name:name, count: offeneTodosListe.filter(function(t){ return t.assignedTo === name; }).length };
    });
    var todoBreakdownHtml =
      '<div class="kpi-todo-breakdown">' +
        '<div class="kpi-todo-row"><span>Allgemein</span><span>' + todosAllgemein + '</span></div>' +
        todosByPerson.map(function(p){
          return '<div class="kpi-todo-row"><span>' + escapeHtml(p.name) + '</span><span>' + p.count + '</span></div>';
        }).join('') +
      '</div>';

    var bereitZurAuslieferung = orders.filter(function(o){
      return computeOrderProgress(o).percent !== 100 && orderTag(o).label === 'Bereit zur Auslieferung';
    });

    var faelligeLeadsListe = leads.filter(isOverdue).slice(0, 5);

    wrap.innerHTML =
      '<div class="hero">' +
        '<h1>' + gruss + '!</h1>' +
        '<div class="hero-date">' + heuteText + '</div>' +
      '</div>' +
      '<div class="start-kpis">' +
        '<div class="start-kpi" id="kpi-leads"><div class="kpi-label">Offene Leads</div><div class="kpi-value">' + offeneLeads + '</div></div>' +
        '<div class="start-kpi" id="kpi-wv"><div class="kpi-label">Fällige Wiedervorlagen</div><div class="kpi-value" style="color:' + (faelligeWV>0?'var(--red)':'var(--ink)') + '">' + faelligeWV + '</div></div>' +
        '<div class="start-kpi" id="kpi-auftraege"><div class="kpi-label">Aufträge in Bearbeitung</div><div class="kpi-value">' + aktiveAuftraege + '</div></div>' +
        '<div class="start-kpi start-kpi-tall" id="kpi-todos"><div class="kpi-label">Offene To-Dos</div><div class="kpi-value">' + offeneTodos + '</div>' + todoBreakdownHtml + '</div>' +
      '</div>' +
      '<div class="start-actions">' +
        '<button class="btn btn-primary" id="start-newlead">+ Neuer Lead</button>' +
        '<button class="btn btn-ghost" id="start-neworder">+ Auftrag anlegen</button>' +
      '</div>' +
      '<div class="stats-cols">' +
        '<div class="start-section"><h3>Fällige Wiedervorlagen</h3>' +
          (faelligeLeadsListe.length
            ? faelligeLeadsListe.map(function(l){
                return '<div class="start-list-item"><span>' + escapeHtml(l.name) + '</span><span style="color:var(--muted);">' + escapeHtml(l.fahrzeug||'') + '</span></div>';
              }).join('')
            : '<div style="color:var(--muted); font-size:13px;">Keine fälligen Wiedervorlagen 🎉</div>') +
        '</div>' +
        '<div class="start-section"><h3>Bereit zur Auslieferung</h3>' +
          (bereitZurAuslieferung.length
            ? bereitZurAuslieferung.map(function(o){
                return '<div class="start-list-item"><span>' + escapeHtml(o.kunde) + '</span><span style="color:var(--muted);">' + escapeHtml(o.fahrzeug) + '</span></div>';
              }).join('')
            : '<div style="color:var(--muted); font-size:13px;">Aktuell nichts auslieferungsbereit</div>') +
        '</div>' +
      '</div>';

    document.getElementById('kpi-leads').addEventListener('click', function(){ switchView('leads'); });
    document.getElementById('kpi-wv').addEventListener('click', function(){ switchView('leads'); });
    document.getElementById('kpi-auftraege').addEventListener('click', function(){ switchView('auftraege'); });
    document.getElementById('kpi-todos').addEventListener('click', function(){ switchView('todos'); });
    document.getElementById('start-newlead').addEventListener('click', openNewModal);
    document.getElementById('start-neworder').addEventListener('click', function(){ openNewOrderModal(); });
  }

  function switchView(view){
    currentView = view;
    document.getElementById('tabStart').classList.toggle('active', view === 'start');
    document.getElementById('tabLeads').classList.toggle('active', view === 'leads');
    document.getElementById('tabAuftraege').classList.toggle('active', view === 'auftraege');
    document.getElementById('tabTodos').classList.toggle('active', view === 'todos');
    document.getElementById('view-start').style.display = view === 'start' ? '' : 'none';
    document.getElementById('view-leads').style.display = view === 'leads' ? '' : 'none';
    document.getElementById('view-auftraege').style.display = view === 'auftraege' ? '' : 'none';
    document.getElementById('view-todos').style.display = view === 'todos' ? '' : 'none';
    if (view === 'start') renderStart();
    if (view === 'auftraege') renderOrders();
    if (view === 'todos') renderTodos();
  }


  // ---------- Wiring ----------
  document.getElementById('btnNew').addEventListener('click', openNewModal);
  document.getElementById('fileImport').addEventListener('change', function(e){
    if (e.target.files && e.target.files[0]) importBackup(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('search').addEventListener('input', function(e){ searchTerm = e.target.value; render(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

  document.getElementById('tabStart').addEventListener('click', function(){ switchView('start'); });
  document.getElementById('tabLeads').addEventListener('click', function(){ switchView('leads'); });
  document.getElementById('tabAuftraege').addEventListener('click', function(){ switchView('auftraege'); });
  document.getElementById('tabTodos').addEventListener('click', function(){ switchView('todos'); });
  document.getElementById('btnNewAuftrag').addEventListener('click', openNewOrderModal);
  document.getElementById('searchAuftrag').addEventListener('input', function(e){ auftragSearchTerm = e.target.value; renderOrders(); });

  document.getElementById('btnSettings').addEventListener('click', openSettingsModal);

  loadSettings();
  loadLeads();
  loadOrders();
  loadTodos();

  } // Ende initMainApp
})();
</script>
</body>
</html>
