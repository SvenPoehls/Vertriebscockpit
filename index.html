  function computeStats(){
    var total = leads.length;
    var byStatus = {}; STATUS_ORDER.forEach(function(s){ byStatus[s] = 0; });
    leads.forEach(function(l){ byStatus[l.status] = (byStatus[l.status]||0) + 1; });
    var gewonnen = byStatus.gewonnen || 0;
    var verloren = byStatus.verloren || 0;
    var closed = gewonnen + verloren;
    var offen = total - closed;

    var byQuelle = {};
    leads.forEach(function(l){
      var k = l.quelle || 'sonstiges';
      byQuelle[k] = byQuelle[k] || { total:0, gewonnen:0 };
      byQuelle[k].total++;
      if (l.status === 'gewonnen') byQuelle[k].gewonnen++;
    });

    var byZustaendig = {};
    leads.forEach(function(l){
      var k = (l.zustaendig && l.zustaendig.trim()) ? l.zustaendig.trim() : '(nicht zugewiesen)';
      byZustaendig[k] = byZustaendig[k] || { total:0, gewonnen:0, verloren:0 };
      byZustaendig[k].total++;
      if (l.status === 'gewonnen') byZustaendig[k].gewonnen++;
      if (l.status === 'verloren') byZustaendig[k].verloren++;
    });

    var byKategorie = { privat:{ total:0, gewonnen:0 }, gewerbe:{ total:0, gewonnen:0 } };
    leads.forEach(function(l){
      var k = l.kategorie === 'gewerbe' ? 'gewerbe' : 'privat';
      byKategorie[k].total++;
      if (l.status === 'gewonnen') byKategorie[k].gewonnen++;
    });

    var winDurations = [];
    leads.forEach(function(l){
      if (l.status !== 'gewonnen' || !l.erstkontakt) return;
      var found = (l.notizen||[]).find(function(n){ return n.text.indexOf('Status geändert: ' + STATUS.gewonnen.label) === 0; });
      if (!found) return;
      var start = new Date(l.erstkontakt + 'T00:00:00').getTime();
      var end = new Date(found.datum).getTime();
      var days = Math.round((end - start) / 86400000);
      if (days >= 0) winDurations.push(days);
    });
    var avgDaysToWin = winDurations.length
      ? Math.round(winDurations.reduce(function(a,b){ return a+b; },0) / winDurations.length)
      : null;

    var activeOrders = orders.filter(function(o){ return computeOrderProgress(o).percent !== 100; });
    var archivedOrders = orders.filter(function(o){ return computeOrderProgress(o).percent === 100; });
    var avgProgress = activeOrders.length
      ? Math.round(activeOrders.reduce(function(sum,o){ return sum + computeOrderProgress(o).percent; },0) / activeOrders.length)
      : null;

    return {
      total:total, byStatus:byStatus, gewonnen:gewonnen, verloren:verloren, closed:closed, offen:offen,
      byQuelle:byQuelle, byZustaendig:byZustaendig, byKategorie:byKategorie, avgDaysToWin:avgDaysToWin,
      activeOrders:activeOrders.length, archivedOrders:archivedOrders.length, avgProgress:avgProgress
    };
  }

  function pct(n, d){ return d ? Math.round(n / d * 100) : null; }

  function renderStats(){
    var wrap = document.getElementById('statsWrap');
    if (!loaded || !ordersLoaded){ wrap.innerHTML = '<div class="loading">Lade Statistiken …</div>'; return; }
    if (leads.length === 0){
      wrap.innerHTML = '<div class="empty"><h3>Noch keine Daten</h3><p>Sobald Leads erfasst sind, siehst du hier die Auswertung.</p></div>';
      return;
    }
    var s = computeStats();
    var winrateClosed = pct(s.gewonnen, s.closed);
    var winrateTotal = pct(s.gewonnen, s.total);
    var lossrateClosed = pct(s.verloren, s.closed);

    var kpis =
      '<div class="stats-grid">' +
        '<div class="kpi-card"><div class="kpi-label">Gesamt Leads</div><div class="kpi-value">' + s.total + '</div>' +
          '<div class="kpi-sub">' + s.offen + ' aktuell offen</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Gewonnen</div><div class="kpi-value" style="color:var(--teal)">' + s.gewonnen + '</div>' +
          '<div class="kpi-sub">' + (winrateTotal!=null ? winrateTotal + '% aller Leads' : '—') + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Verloren</div><div class="kpi-value" style="color:var(--red)">' + s.verloren + '</div>' +
          '<div class="kpi-sub">' + (pct(s.verloren,s.total)!=null ? pct(s.verloren,s.total) + '% aller Leads' : '—') + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">Abschlussquote</div><div class="kpi-value" style="color:var(--amber-ink)">' +
          (winrateClosed!=null ? winrateClosed + '%' : '—') + '</div>' +
          '<div class="kpi-sub">von ' + s.closed + ' abgeschlossenen Leads</div></div>' +
      '</div>';

    var maxStatusCount = Math.max.apply(null, STATUS_ORDER.map(function(st){ return s.byStatus[st]; }).concat([1]));
    var statusBars = STATUS_ORDER.map(function(st){
      var c = s.byStatus[st];
      var w = Math.round(c / maxStatusCount * 100);
      return '<div class="bar-row"><div class="bar-label">' + STATUS[st].label + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%; background:' + STATUS[st].color + '"></div></div>' +
        '<div class="bar-value">' + c + '</div></div>';
    }).join('');

    var quelleRows = Object.keys(s.byQuelle).sort(function(a,b){ return s.byQuelle[b].total - s.byQuelle[a].total; }).map(function(k){
      var q = s.byQuelle[k];
      var rate = pct(q.gewonnen, q.total);
      return '<tr><td>' + (QUELLEN[k]||k) + '</td><td>' + q.total + '</td><td>' + q.gewonnen + '</td><td>' + (rate!=null?rate+'%':'—') + '</td></tr>';
    }).join('');

    var zRows = Object.keys(s.byZustaendig).sort(function(a,b){ return s.byZustaendig[b].total - s.byZustaendig[a].total; }).map(function(k){
      var z = s.byZustaendig[k];
      var rate = pct(z.gewonnen, z.total);
      return '<tr><td>' + escapeHtml(k) + '</td><td>' + z.total + '</td><td>' + z.gewonnen + '</td><td>' + z.verloren + '</td><td>' + (rate!=null?rate+'%':'—') + '</td></tr>';
    }).join('');

    var kategorieRows = ['privat','gewerbe'].map(function(k){
      var kk = s.byKategorie[k];
      var rate = pct(kk.gewonnen, kk.total);
      return '<tr><td>' + (k==='gewerbe'?'Gewerbekunde':'Privatkunde') + '</td><td>' + kk.total + '</td><td>' + kk.gewonnen + '</td><td>' + (rate!=null?rate+'%':'—') + '</td></tr>';
    }).join('');

    var auftragSection =
      '<div class="stats-section"><h3>Auftragsabwicklung</h3>' +
        '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr); margin-bottom:0;">' +
          '<div class="kpi-card"><div class="kpi-label">In Bearbeitung</div><div class="kpi-value">' + s.activeOrders + '</div></div>' +
          '<div class="kpi-card"><div class="kpi-label">Abgeschlossen</div><div class="kpi-value" style="color:var(--teal)">' + s.archivedOrders + '</div></div>' +
          '<div class="kpi-card"><div class="kpi-label">Ø Fortschritt aktiv</div><div class="kpi-value">' + (s.avgProgress!=null ? s.avgProgress+'%' : '—') + '</div></div>' +
        '</div>' +
      '</div>';

    wrap.innerHTML = kpis +
      '<div class="stats-section"><h3>Leads nach Status</h3>' + statusBars +
        (s.avgDaysToWin!=null ? '<div style="margin-top:12px; font-size:12.5px; color:var(--muted);">Ø Zeit bis "Gewonnen": <b style="color:var(--ink)">' + s.avgDaysToWin + ' Tage</b> (ab Erstkontakt)</div>' : '') +
      '</div>' +
      '<div class="stats-section"><h3>Privat vs. Gewerbe</h3>' +
        '<table class="stats-table"><thead><tr><th>Kategorie</th><th>Gesamt</th><th>Gewonnen</th><th>Quote</th></tr></thead><tbody>' + kategorieRows + '</tbody></table>' +
      '</div>' +
      auftragSection;
  }

  function switchView(view){
    currentView = view;
    document.getElementById('tabStart').classList.toggle('active', view === 'start');
    document.getElementById('tabLeads').classList.toggle('active', view === 'leads');
    document.getElementById('tabAuftraege').classList.toggle('active', view === 'auftraege');
    document.getElementById('tabBestandskunden').classList.toggle('active', view === 'bestandskunden');
    document.getElementById('tabTodos').classList.toggle('active', view === 'todos');
    document.getElementById('tabStats').classList.toggle('active', view === 'statistiken');
    document.getElementById('view-start').style.display = view === 'start' ? '' : 'none';
    document.getElementById('view-leads').style.display = view === 'leads' ? '' : 'none';
    document.getElementById('view-auftraege').style.display = view === 'auftraege' ? '' : 'none';
    document.getElementById('view-bestandskunden').style.display = view === 'bestandskunden' ? '' : 'none';
    document.getElementById('view-todos').style.display = view === 'todos' ? '' : 'none';
    document.getElementById('view-statistiken').style.display = view === 'statistiken' ? '' : 'none';
    if (view === 'start') renderStart();
    if (view === 'auftraege') renderOrders();
    if (view === 'bestandskunden') renderBestandskunden();
    if (view === 'todos') renderTodos();
    if (view === 'statistiken') renderStats();
  }


  // ---------- Wiring ----------
  document.getElementById('btnNew').addEventListener('click', openNewModal);
  document.getElementById('fileImport').addEventListener('change', function(e){
    if (e.target.files && e.target.files[0]) importBackup(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('search').addEventListener('input', function(e){ searchTerm = e.target.value; render(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

  document.getElementById('tabStart').addEventListener('click', function(){ switchView('start'); });
  document.getElementById('tabLeads').addEventListener('click', function(){ switchView('leads'); });
  document.getElementById('tabAuftraege').addEventListener('click', function(){ switchView('auftraege'); });
  document.getElementById('tabBestandskunden').addEventListener('click', function(){ switchView('bestandskunden'); });
  document.getElementById('tabTodos').addEventListener('click', function(){ switchView('todos'); });
  document.getElementById('tabStats').addEventListener('click', function(){ switchView('statistiken'); });
  document.getElementById('btnNewAuftrag').addEventListener('click', openNewOrderModal);
  document.getElementById('searchAuftrag').addEventListener('input', function(e){ auftragSearchTerm = e.target.value; renderOrders(); });
  document.getElementById('searchBestandskunden').addEventListener('input', function(e){ bkSearchTerm = e.target.value; renderBestandskunden(); });
  document.getElementById('bkSortBy').addEventListener('change', function(e){ bkSortBy = e.target.value; renderBestandskunden(); });
  document.getElementById('bkJahrFilter').addEventListener('change', function(e){ bkJahrFilter = e.target.value; renderBestandskunden(); });
  document.getElementById('bkMonatFilter').addEventListener('change', function(e){ bkMonatFilter = e.target.value; renderBestandskunden(); });
  document.getElementById('bkZahlungsartFilter').addEventListener('change', function(e){ bkZahlungsartFilter = e.target.value; renderBestandskunden(); });

  document.getElementById('btnSettings').addEventListener('click', openSettingsModal);

  loadSettings();
  loadLeads();
  loadOrders();
  loadTodos();
})();
</script>
</body>
</html>
