<style>
  :root{
    --paper:#ECEEF0;
    --panel:#FFFFFF;
    --surface:#FFFFFF;
    --surface-muted:#F8F9FA;
    --track:#F0F1F3;
    --ink:#1B1E24;
    --muted:#6B7280;
    --line:#D7DBDD;
    --amber:#E8862E;
    --amber-ink:#7A3D0A;
    --teal:#1F6F6B;
    --red:#C1432E;
    --steel:#3D5A73;
    --plum:#6B4C8A;
    --greyblue:#7B8794;
    --neu-color:#1C8FB0;
    --kontaktiert-color:#4258C9;
    --tint-steel:#EAF0F4;
    --tint-amber:#FCEEDF;
    --tint-teal:#E4F2F0;
    --tint-plum:#EFEAF6;
    --tint-grey:#EBEDEF;
    --tint-danger:#FCEAE6;
    --tint-danger-border:#F2C9BE;
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  [data-theme="dark"]{
    --paper:#1B1D21;
    --panel:#24262B;
    --surface:#2C2F35;
    --surface-muted:#23252A;
    --track:#33363D;
    --ink:#ECEEF0;
    --muted:#9099A3;
    --line:#3A3D44;
    --tint-steel:rgba(61,90,115,.28);
    --tint-amber:rgba(232,134,46,.20);
    --tint-teal:rgba(31,111,107,.25);
    --tint-plum:rgba(107,76,138,.28);
    --tint-grey:rgba(167,177,188,.22);
    --tint-danger:rgba(193,67,46,.22);
    --tint-danger-border:rgba(193,67,46,.5);
    --steel:#7FA6C9;
    --amber-ink:#F2A35E;
    --plum:#B594D6;
    --teal:#4FBFB6;
    --red:#E8897A;
    --greyblue:#A7B1BC;
    --neu-color:#52B8D9;
    --kontaktiert-color:#8C9FEE;
  }
  [data-theme="dark"] .plate{ border-color:#14161A; }
  [data-theme="dark"] .plate .txt{ color:#14161A; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:14px;
    line-height:1.45;
  }
  button, input, select, textarea{ font-family:inherit; font-size:inherit; }
  button{ cursor:pointer; }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; border-radius:3px; }
  .wrap{ max-width:1280px; margin:0 auto; padding:24px 20px 60px; }

  /* Header */
  .hdr{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
  .hdr h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:26px;
    letter-spacing:0.3px;
    margin:0;
    text-transform:uppercase;
  }
  .hdr .sub{ color:var(--muted); font-size:13px; margin-top:2px; }

  /* Toolbar */
  .toolbar{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:16px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
  }
  .search{
    flex:1 1 220px;
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px 10px;
    background:var(--paper);
  }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    border-radius:20px;
    padding:6px 12px;
    font-size:12.5px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .chip .dot{ width:7px; height:7px; border-radius:50%; flex:none; }
  select.zfilter{
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px 10px;
    background:var(--paper);
    color:var(--ink);
  }
  .spacer{ flex:1; }
  .overdue-flag{
    font-size:12.5px;
    font-weight:700;
    color:var(--red);
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--tint-danger);
    border:1px solid var(--tint-danger-border);
    padding:6px 12px;
    border-radius:20px;
  }
  .btn{
    border:none;
    border-radius:7px;
    padding:9px 16px;
    font-weight:700;
    font-size:13px;
  }
  .btn-primary{ background:var(--amber); color:#fff; }
  .btn-primary:hover{ background:#D9772A; }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn-ghost:hover{ background:var(--paper); }
  .btn-danger{ background:transparent; color:var(--red); border:1px solid #E8B6AC; }
  .btn-danger:hover{ background:var(--tint-danger); }
  .btn-sm{ padding:6px 11px; font-size:12px; border-radius:6px; }

  /* Table */
  .tablewrap{ background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--muted);
    font-weight:700;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    background:var(--surface-muted);
  }
  tbody tr.row{ border-bottom:1px solid var(--line); transition:background .12s; }
  tbody tr.row:hover{ background:#FAFAFB; cursor:pointer; }
  tbody tr.row td{ padding:11px 14px; vertical-align:middle; position:relative; }
  tbody tr.row td:first-child{ padding-left:14px; }
  .statusbar{
    position:absolute; left:0; top:0; bottom:0; width:4px;
  }
  .status-label{ font-size:12px; font-weight:700; padding-left:10px; }
  .kunde-name{ font-weight:700; }
  .kunde-meta{ color:var(--muted); font-size:12px; margin-top:2px; font-family:var(--font-mono); }
  .datetext{ font-family:var(--font-mono); font-size:12.5px; }
  .wv-chip{ display:inline-block; padding:3px 10px; border-radius:20px; font-family:var(--font-mono); font-size:12px; font-weight:700; }
  .wv-overdue{ background:var(--tint-danger); color:var(--red); }
  .wv-today{ background:var(--tint-amber); color:var(--amber-ink); }
  .wv-upcoming{ background:var(--tint-steel); color:var(--steel); }
  .chevron{ color:var(--muted); transition:transform .15s; }
  .chevron.open{ transform:rotate(90deg); }
  .name-suggestions{
    position:absolute; left:0; right:0; top:100%; z-index:30; background:var(--surface); border:1px solid var(--line);
    border-radius:8px; margin-top:4px; box-shadow:0 4px 14px rgba(0,0,0,.12); overflow:hidden; display:none;
  }
  .name-suggestions.show{ display:block; }
  .name-suggestion-item{ padding:9px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--line); }
  .name-suggestion-item:last-child{ border-bottom:none; }
  .name-suggestion-item:hover{ background:var(--paper); }
  .name-suggestion-item .ns-meta{ color:var(--muted); font-size:11.5px; margin-top:2px; }

  /* Plate chip — signature element */
  .plate{
    display:inline-flex;
    align-items:stretch;
    border:2px solid var(--ink);
    border-radius:5px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,.05);
  }
  .plate .eu{
    background:#1B3F8B;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2px 4px;
    font-size:8px;
    font-weight:700;
    line-height:1;
    gap:1px;
  }
  .plate .stars{ font-size:5px; letter-spacing:1px; opacity:.9; }
  .plate .txt{
    font-family:var(--font-mono);
    font-weight:700;
    letter-spacing:0.5px;
    padding:3px 9px;
    font-size:13px;
    color:var(--ink);
    white-space:nowrap;
  }

  /* Detail row */
  tr.detail-row td{ padding:0; border-bottom:1px solid var(--line); }
  .detail{ background:#F8F9FA; padding:18px 20px; display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .detail h4{ font-family:var(--font-display); text-transform:uppercase; font-size:12px; letter-spacing:0.5px; color:var(--muted); margin:0 0 10px; }
  .field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:11px; color:var(--muted); font-weight:600; }
  .field input, .field select{
    border:1px solid var(--line); border-radius:6px; padding:7px 9px; background:var(--surface); color:var(--ink);
  }
  .history{ display:flex; flex-direction:column; gap:10px; max-height:240px; overflow-y:auto; padding-right:4px; }
  .history-item{ border-left:2px solid var(--line); padding-left:10px; }
  .history-item .when{ font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .history-item .what{ font-size:13px; margin-top:2px; }
  .note-form{ display:flex; gap:8px; margin-top:10px; }
  .note-form textarea{
    flex:1; border:1px solid var(--line); border-radius:6px; padding:8px; resize:vertical; min-height:38px;
  }
  .detail-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:16px; grid-column:1/-1; border-top:1px solid var(--line); padding-top:14px; }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,22,26,.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal{
    background:var(--surface); border-radius:12px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:24px;
  }
  .modal h2{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; margin:0 0 16px; }
  .modal .field-grid{ grid-template-columns:1fr 1fr; }
  .modal .field.full{ grid-column:1/-1; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }

  /* Empty / loading state */
  .empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty h3{ font-family:var(--font-display); text-transform:uppercase; color:var(--ink); font-size:16px; margin-bottom:6px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--muted); font-family:var(--font-mono); font-size:13px; }
  .gate-overlay{
    position:fixed; inset:0; background:var(--paper); display:flex; align-items:center; justify-content:center;
    z-index:9999; padding:20px;
  }
  .gate-box{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:36px 32px; max-width:340px; width:100%;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.15);
  }
  .gate-box h2{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; margin:0 0 6px; }
  .gate-box p{ color:var(--muted); font-size:12.5px; margin:0 0 20px; }
  .gate-box input{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:11px 12px; font-size:16px; text-align:center;
    background:var(--surface); color:var(--ink); margin-bottom:12px; letter-spacing:1px;
  }
  .gate-box .gate-error{ color:var(--red); font-size:12px; margin-bottom:10px; min-height:16px; }
  .toast{
    position:fixed; bottom:20px; right:20px; background:var(--ink); color:var(--paper); padding:10px 16px; border-radius:8px; font-size:13px; font-weight:600; opacity:0; transform:translateY(8px); transition:all .2s; pointer-events:none; z-index:80;
  }
  .toast.show{ opacity:1; transform:translateY(0); }

  .footer-note{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:28px; }

  /* Startseite */
  .hero{
    background:linear-gradient(135deg, var(--ink) 0%, #2E3340 100%);
    border-radius:14px; padding:36px 32px; color:#fff; margin-bottom:24px; margin-top:40px; position:relative; overflow:hidden;
  }
  [data-theme="dark"] .hero{ background:linear-gradient(135deg, #14161A 0%, #2C2F35 100%); }
  .hero h1{ font-family:var(--font-display); text-transform:uppercase; font-size:26px; margin:0 0 6px; letter-spacing:0.3px; }
  .hero p{ margin:0; opacity:0.8; font-size:13.5px; }
  .hero .hero-date{ font-family:var(--font-mono); font-size:12px; opacity:0.65; margin-top:10px; }
  .start-kpis{ display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:24px; align-items:start; }
  .start-kpi{
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; cursor:pointer; transition:transform .12s;
  }
  .start-kpi:hover{ transform:translateY(-2px); border-color:var(--amber); }
  .start-kpi .kpi-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); font-weight:700; margin-bottom:6px; }
  .start-kpi .kpi-value{ font-family:var(--font-display); font-size:30px; font-weight:600; line-height:1; }
  .start-kpi-tall{ padding-bottom:18px; min-height:150px; }
  .kpi-todo-breakdown{ margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .kpi-todo-row{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); padding:3px 0; }
  .kpi-todo-row span:last-child{ font-family:var(--font-mono); font-weight:700; color:var(--ink); }
  .start-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
  .start-section{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px 20px; margin-bottom:16px; }
  .start-section h3{ font-family:var(--font-display); text-transform:uppercase; font-size:13px; letter-spacing:0.3px; margin:0 0 12px; }
  .start-list-item{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .start-list-item:last-child{ border-bottom:none; }
  @media (max-width:760px){
    .start-kpis{ grid-template-columns:1fr 1fr; }
  }
  .footer-note button{ background:none; border:none; color:var(--muted); text-decoration:underline; font-size:11.5px; cursor:pointer; padding:0; }

  /* Responsive: stack table as cards */
  @media (max-width:760px){
    thead{ display:none; }
    tbody tr.row{ display:block; padding:12px 14px 12px 18px; position:relative; }
    tbody tr.row td{ display:block; padding:3px 0; border:none; }
    tbody tr.row td:first-child{ padding-left:0; }
    .statusbar{ width:4px; }
    td[data-label]::before{
      content: attr(data-label);
      display:block; font-size:10px; text-transform:uppercase; color:var(--muted); font-weight:700; margin-top:6px;
    }
    td[data-label="Kunde"]::before{ display:none; }
    .detail{ grid-template-columns:1fr; }
    .field-grid{ grid-template-columns:1fr; }
    .modal .field-grid{ grid-template-columns:1fr; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  /* Tabs */
  .tabs{ display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--line); }
  .tab{
    background:transparent; border:none; padding:10px 16px; font-weight:700; font-size:13px;
    color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab.active{ color:var(--ink); border-bottom-color:var(--amber); }
  .tab:hover{ color:var(--ink); }
  .todo-tab-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:16px; height:16px; margin-left:6px; border-radius:50%;
    background:var(--red); color:#fff; font-size:11px; font-weight:700; line-height:1;
  }

  /* Progress bar for Auftragsabwicklung */
  .progress-wrap{ display:flex; align-items:center; gap:8px; min-width:140px; }
  .progress-track{ flex:1; height:6px; background:var(--line); border-radius:4px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--amber); border-radius:4px; }
  .progress-fill.done{ background:var(--teal); }
  .progress-text{ font-family:var(--font-mono); font-size:11.5px; color:var(--muted); white-space:nowrap; }

  .kunde-extra-badge{
    display:inline-block; font-size:10.5px; font-weight:700; color:var(--amber-ink); background:var(--tint-amber);
    border-radius:10px; padding:1px 6px; margin-left:5px; vertical-align:super;
  }
  .auftrag-vehicle-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px;
    border:1px solid var(--line); border-radius:7px; background:var(--surface); margin-bottom:6px; cursor:pointer;
  }
  .auftrag-vehicle-row:hover{ background:var(--surface-muted); }
  .auftrag-vehicles-panel{ padding:12px 16px 14px; background:var(--surface-muted); }

  .auftrag-tag{
    display:inline-block; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px;
  }
  .tag-bearbeitung{ background:var(--tint-steel); color:var(--steel); }
  .tag-bereit{ background:var(--tint-amber); color:var(--amber-ink); }
  .tag-ausgeliefert{ background:var(--tint-teal); color:var(--teal); }
  .tag-fahrzeugtyp{ background:var(--tint-plum); color:var(--plum); }
  .tag-typ-neu{ background:var(--tint-teal); color:var(--teal); }
  .tag-typ-vorfuehrwagen{ background:var(--tint-plum); color:var(--plum); }
  .tag-typ-gebraucht{ background:var(--tint-grey); color:var(--greyblue); }
  .tag-zahlung-barkauf{ background:var(--tint-teal); color:var(--teal); }
  .tag-zahlung-finanzierung{ background:var(--tint-steel); color:var(--steel); }
  .tag-zahlung-leasing{ background:var(--tint-plum); color:var(--plum); }
  .tag-privat{ background:var(--tint-steel); color:var(--steel); }
  .tag-gewerbe{ background:var(--tint-amber); color:var(--amber-ink); }

  .checklist{ display:flex; flex-direction:column; gap:8px; }
  .checklist-group-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); font-weight:700;
    margin-top:6px; margin-left:2px;
  }
  .checklist-item{
    display:flex; align-items:center; gap:10px; padding:7px 10px; border:1px solid var(--line);
    border-radius:7px; background:var(--surface);
  }
  .checklist-item.checked{ background:var(--tint-teal); border-color:var(--teal); }
  .checklist-item input[type="checkbox"]{ width:16px; height:16px; flex:none; accent-color:var(--teal); }
  .checklist-item label{ flex:1; font-size:13px; font-weight:600; }
  .checklist-item input[type="date"]{
    border:1px solid var(--line); border-radius:6px; padding:5px 7px; font-size:12px; font-family:var(--font-mono);
  }
  .checklist-item select{ border:1px solid var(--line); border-radius:6px; padding:5px 7px; font-size:12px; }
  .step-assignee{ max-width:110px; background:var(--surface); color:var(--ink); flex:none; }
  .lead-snapshot{
    display:flex; flex-wrap:wrap; gap:18px; background:var(--surface); border:1px solid var(--line); border-radius:8px;
    padding:12px 14px; padding-right:40px; margin-bottom:14px; font-size:13px; position:relative;

  .stats-cols{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  .todo-col{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; min-height:120px; }
  .todo-col h3{ font-family:var(--font-display); text-transform:uppercase; font-size:13px; letter-spacing:0.3px; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between; }
  .todo-col h3 .count{ font-family:var(--font-mono); font-size:11px; color:var(--muted); font-weight:600; }
  .todo-due{ font-size:11px; font-weight:700; display:inline-block; padding:2px 8px; border-radius:12px; }
  .todo-due.due-overdue{ background:var(--tint-danger); color:var(--red); }
  .todo-due.due-today{ background:var(--tint-amber); color:var(--amber-ink); }
  .todo-due.due-future{ background:var(--tint-steel); color:var(--steel); }
  .todo-empty{ color:var(--muted); font-size:12px; }
  .todo-row{ display:flex; align-items:flex-start; gap:8px; padding:5px 2px; }
  .todo-row input[type="checkbox"]{ margin-top:3px; width:15px; height:15px; accent-color:var(--teal); flex:none; }
  .todo-row .todo-text{ flex:1; font-size:13px; line-height:1.4; }
  .todo-row.done .todo-text{ text-decoration:line-through; color:var(--muted); }
  .todo-row .todo-del{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0 2px; opacity:0; flex:none; }
  .todo-row:hover .todo-del{ opacity:1; }
  .todo-row .todo-del:hover{ color:var(--red); }
  .todo-newinput{
    width:100%; border:none; background:transparent; font-size:13px; padding:5px 2px; color:var(--muted);
    font-family:inherit; outline:none;
  }
  .todo-newinput::placeholder{ color:var(--muted); opacity:0.7; }
  .todo-newinput:focus{ color:var(--ink); }
  .todo-editinput{
    flex:1; border:1px solid var(--line); border-radius:5px; background:var(--surface); color:var(--ink);
    font-size:13px; font-family:inherit; padding:3px 6px; outline:none;
  }
  @media (max-width:760px){
    .stats-cols{ grid-template-columns:1fr; }
  }
</style>

<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1>Vertriebs-Cockpit</h1>
      <div class="sub" id="syncStatus">🔄 Verbinde mit Live-Sync …</div>
    </div>
    <div style="display:flex; gap:8px;">
      <input type="file" id="fileImport" accept="application/json" style="display:none;">
      <button class="btn btn-ghost" id="btnSettings" title="Einstellungen" style="font-size:16px; padding:9px 12px;">⚙️</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabStart" data-view="start">Start</button>
    <button class="tab" id="tabTodos" data-view="todos">To-Dos<span id="todoTabBadge" class="todo-tab-badge" style="display:none;">!</span></button>
    <button class="tab" id="tabLeads" data-view="leads">Leads</button>
    <button class="tab" id="tabAuftraege" data-view="auftraege">Aufträge</button>
  </div>

  <section id="view-start">
    <div id="startWrap"></div>
  </section>

  <section id="view-leads" style="display:none;">
    <div class="toolbar">
      <input type="text" class="search" id="search" placeholder="Suche nach Name, Fahrzeug …">
      <div class="chips" id="statusChips"></div>
      <div class="spacer"></div>
      <div class="overdue-flag" id="overdueFlag" style="display:none;"></div>
      <button class="btn btn-primary" id="btnNew">+ Neuer Lead</button>

    <div class="tablewrap" id="tableWrap">
      <div class="loading">Lade Leads …</div>

    <div class="footer-note" id="footerNote"></div>
  </section>

  <section id="view-auftraege" style="display:none;">
    <div class="toolbar">
      <input type="text" class="search" id="searchAuftrag" placeholder="Suche nach Name, Fahrzeug …">

      <div class="spacer"></div>
      <button class="btn btn-ghost" id="btnNewAuftrag">+ Auftrag manuell anlegen</button>

    <div class="tablewrap" id="auftragWrap">
      <div class="loading">Lade Aufträge …</div>

  <section id="view-todos" style="display:none;">
    <div id="todosWrap"><div class="loading">Lade To-Dos …</div></div>
  </section>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- Firebase-Grundinitialisierung (wird sowohl für die Zugangssperre als auch die App selbst gebraucht) ----------
  var firebaseConfig = {
    apiKey: "AIzaSyDGije5V6_3tKYTaNCIY-AnOWqSKG2pmOo",
    authDomain: "vertriebs-copilot.firebaseapp.com",
    databaseURL: "https://vertriebs-copilot-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "vertriebs-copilot",
    storageBucket: "vertriebs-copilot.firebasestorage.app",
    messagingSenderId: "827274574386",
    appId: "1:827274574386:web:5490412df034cd98901a2b"
  };
  var fbApp = null;
  var fbDb = null;
  try {
    fbApp = firebase.initializeApp(firebaseConfig);
    fbDb = firebase.database();
  } catch (e) {
    console.error('Firebase-Initialisierung fehlgeschlagen', e);
  }
  function dbRef(path){
    if (!fbDb) throw new Error('Keine Verbindung zur Datenbank');
    return fbDb.ref(path);
  }

  // ---------- Zugangscode-Sperre ----------
  var ACCESS_CODE_DEFAULT = "Autohaus2026"; // wird nur verwendet, solange noch kein Code in der Datenbank gespeichert ist
  var GATE_KEY = "vc_zugang_freigegeben";
  var currentAccessCode = ACCESS_CODE_DEFAULT;

  function showGate(){
    document.body.innerHTML =
      '<div class="gate-overlay" id="gateOverlay">' +
        '<div class="gate-box">' +
          '<h2>🔒 Zugang erforderlich</h2>' +
          '<p>Bitte den Zugangscode eingeben, um das Vertriebscockpit zu öffnen.</p>' +
          '<input type="password" id="gateInput" placeholder="Zugangscode" autocomplete="off">' +
          '<div class="gate-error" id="gateError"></div>' +
          '<button class="btn btn-primary" id="gateSubmit" style="width:100%;">Zugang freischalten</button>' +
        '</div>' +
      '</div>';
    var input = document.getElementById('gateInput');
    var errorEl = document.getElementById('gateError');
    function tryUnlock(){
      if (input.value === currentAccessCode){
        try { window.localStorage.setItem(GATE_KEY, currentAccessCode); } catch (e) { /* Speicherung optional */ }
        location.reload();
      } else {
        errorEl.textContent = 'Falscher Code — bitte erneut versuchen.';
        input.value = '';
        input.focus();
      }
    }
    document.getElementById('gateSubmit').addEventListener('click', tryUnlock);
    input.addEventListener('keydown', function(e){ if (e.key === 'Enter') tryUnlock(); });
    input.focus();
  }

  function proceedAfterCodeCheck(){
    var savedCode = null;
    try { savedCode = window.localStorage.getItem(GATE_KEY); } catch (e) { /* kein localStorage verfügbar */ }
    if (savedCode === currentAccessCode){
      initMainApp();
    } else {
      showGate();
    }
  }

  // Aktuellen Zugangscode aus der Datenbank laden (mit Timeout-Fallback, falls keine Verbindung besteht)
  (function checkAccessCode(){
    var resolved = false;
    function finish(code){
      if (resolved) return;
      resolved = true;
      if (code) currentAccessCode = code;
      proceedAfterCodeCheck();
    }
    if (!fbDb){ finish(null); return; }
    try {
      dbRef('config/zugangscode').once('value').then(function(snap){
        finish(snap.val());
      }).catch(function(){ finish(null); });
    } catch (e) { finish(null); }
    setTimeout(function(){ finish(null); }, 4000); // bei sehr langsamer/fehlender Verbindung nicht ewig blockieren
  })();

  function initMainApp(){
  function setSyncStatus(text, ok){
    var el = document.getElementById('syncStatus');
    if (el){ el.textContent = text; el.style.color = ok ? 'var(--teal)' : 'var(--red)'; }
  }
  if (fbDb){
    fbDb.ref('.info/connected').on('value', function(snap){
      setSyncStatus(snap.val() ? '🟢 Live verbunden — Änderungen werden sofort geteilt' : '🟠 Verbindung wird hergestellt …', !!snap.val());
    });
  } else {
    setSyncStatus('🔴 Keine Verbindung — Internet/Konfiguration prüfen', false);
  }

  var STATUS = {
    neu:         { label:'Neu',                color:'var(--neu-color)' },
    kontaktiert: { label:'Kontaktiert',         color:'var(--kontaktiert-color)' },
    angebot:     { label:'Angebot verschickt',  color:'var(--amber)'    },
    verhandlung: { label:'In Verhandlung',      color:'var(--plum)'     },
    gewonnen:    { label:'Gewonnen',            color:'var(--teal)'     },
    verloren:    { label:'Verloren',            color:'var(--red)'      }
  };
  var STATUS_ORDER = ['neu','kontaktiert','angebot','verhandlung','gewonnen','verloren'];
  var QUELLEN = {
    email:'Email', telefon:'Telefon', autocrm:'AutoCRM',
    walkin:'Vor-Ort', sonstiges:'Sonstiges'
  };

  var STORAGE_KEY = 'leads';
  var SETTINGS_KEY = 'einstellungen';
  var settings = { theme:'hell', zustaendige:[], showSyncStatus:false };
  var editingZName = null;
  var ORDERS_KEY = 'auftraege';
  var leads = [];
  var orders = [];
  var ordersLoaded = false;
  var todos = [];
  var todoRemovalTimers = {};
  var todosLoaded = false;
  var loaded = false;
  var migrationDone = false;
  var loadError = false;
  var activeStatusFilter = '';
  var overdueOnly = false;
  var searchTerm = '';
  var expandedId = null;
  var currentView = 'start';
  var expandedOrderId = null;
  var activeAuftragFilter = '';
  var auftragSearchTerm = '';

  var ZAHLUNGSARTEN = { barkauf:'Barkauf', finanzierung:'Finanzierung', leasing:'Leasing' };
  var FAHRZEUGTYPEN = { neu:'Neuwagen', vorfuehrwagen:'Vorführwagen', gebraucht:'Gebrauchtwagen' };
  function fahrzeugtypTagClass(typ){ return 'tag-typ-' + (FAHRZEUGTYPEN[typ] ? typ : 'gebraucht'); }

  var ORDER_STEPS = [
    { key:'vertragVorhanden',          label:'Bankvertrag unterschrieben',       relevant: function(o){ return o.zahlungsart !== 'barkauf'; } },
    { key:'bestellungUnterschrieben',  label:'Bestellung unterschrieben',        relevant: function(){ return true; }, hasDate:true },
    { key:'fahrzeugAngeliefert',       label:'Fahrzeug angeliefert',             relevant: function(){ return true; } },
    { key:'werkstattauftragGeschrieben', label:'Werkstattauftrag schreiben',     relevant: function(){ return true; }, assignable:true },
    { key:'fahrzeugZugelassen',        label:'Fahrzeug zulassen',                relevant: function(){ return true; }, assignable:true },
    { key:'aufbereitet',               label:'Aufbereitungsauftrag geschrieben', relevant: function(){ return true; }, assignable:true },
    { key:'zahlungseingangGeprueft',   label:'Zahlungseingang prüfen',           relevant: function(){ return true; } },
    { key:'ankaufsvertragAusgedruckt', label:'Ankaufsvertrag ausgedruckt',       relevant: function(o){ return !!o.eigenzulassung; } },
    { key:'fahrzeugAusgeliefert',      label:'Auslieferungstermin festgelegt',   relevant: function(){ return true; }, hasDate:true, assignable:true }
  ];

  function uid(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
  }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function addDaysISO(isoDate, days){
    var d = isoDate ? new Date(isoDate + 'T00:00:00') : new Date();
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0,10);
  }
  function addMonthsISO(isoDate, months){
    var d = isoDate ? new Date(isoDate + 'T00:00:00') : new Date();
    d.setMonth(d.getMonth() + months);
    return d.toISOString().slice(0,10);
  }
  var STANDARD_WIEDERVORLAGE_TAGE = 2;
  function fmtDate(iso){
    if(!iso) return '—';
    var d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
  }
  function fmtDateTime(iso){
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' · ' +
           d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  }
  function isOverdue(lead){
    if (!lead.wiedervorlage) return false;
    if (lead.status === 'gewonnen' || lead.status === 'verloren') return false;
    return lead.wiedervorlage <= todayISO();
  }
  function isToday(lead){
    return lead.wiedervorlage === todayISO();
  }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  function loadLeads(){
    try {
      dbRef('leads').on('value', function(snapshot){
        var val = snapshot.val();
        leads = Array.isArray(val) ? val : (val ? Object.keys(val).map(function(k){ return val[k]; }) : []);
        loaded = true;
        render();
        if (currentView === 'start') renderStart();
        generateEskalationTodos();
        maybeRunMigration();
      }, function(error){
        loaded = true;
        showToast('Verbindung zu Leads verloren: ' + error.message);
      });
    } catch (e) {
      leads = [];
      loaded = true;
      render();
    }
  }

  async function persist(){
    try {
      await dbRef('leads').set(leads);
      loadError = false;
    } catch (e) {
      loadError = true;
      showToast('Speichern fehlgeschlagen — Internetverbindung prüfen');
    }
  }

  function loadOrders(){
    try {
      dbRef('auftraege').on('value', function(snapshot){
        var val = snapshot.val();
        orders = Array.isArray(val) ? val : (val ? Object.keys(val).map(function(k){ return val[k]; }) : []);
        ordersLoaded = true;
        if (currentView === 'auftraege') renderOrders();
        if (currentView === 'start') renderStart();
        generateLeasingTodos();
        maybeRunMigration();
      }, function(error){
        ordersLoaded = true;
        showToast('Verbindung zu Aufträgen verloren: ' + error.message);
      });
    } catch (e) {
      orders = [];
      ordersLoaded = true;
    }
  }

  async function persistOrders(){
    try {
      await dbRef('auftraege').set(orders);
    } catch (e) {
      showToast('Speichern fehlgeschlagen — Internetverbindung prüfen');
    }
  }

  function updateTodoTabBadge(){
    var badge = document.getElementById('todoTabBadge');
    if (!badge) return;
    var hasOpenTodo = todos.some(function(t){ return !t.done; });
    badge.style.display = hasOpenTodo ? '' : 'none';
  }

  function loadTodos(){
    try {
      dbRef('todos').on('value', function(snapshot){
        var val = snapshot.val();
        todos = Array.isArray(val) ? val : (val ? Object.keys(val).map(function(k){ return val[k]; }) : []);
        todosLoaded = true;
        updateTodoTabBadge();
        if (currentView === 'todos') renderTodos();
        if (currentView === 'start') renderStart();
        generateNachkaufTodos();
        generateEskalationTodos();
        generateLeasingTodos();
      }, function(error){
        todosLoaded = true;
        showToast('Verbindung zu To-Dos verloren: ' + error.message);
      });
    } catch (e) {
      todos = [];
      todosLoaded = true;
    }
  }

  async function persistTodos(){
    try {
      await dbRef('todos').set(todos);
    } catch (e) {
      showToast('Speichern fehlgeschlagen — Internetverbindung prüfen');
    }
  }

  function loadSettings(){
    try {
      var raw = window.localStorage.getItem(SETTINGS_KEY);
      if (raw){
        var parsed = JSON.parse(raw);
        settings.theme = parsed.theme === 'dunkel' ? 'dunkel' : 'hell';
        settings.showSyncStatus = parsed.showSyncStatus === true;
      }
    } catch (e) { /* Standardwert beibehalten */ }
    applyTheme();
    applySyncStatusVisibility();
    try {
      dbRef('zustaendige').on('value', function(snapshot){
        var val = snapshot.val();
        settings.zustaendige = Array.isArray(val) ? val : (val ? Object.keys(val).map(function(k){ return val[k]; }) : []);
      });
    } catch (e) { /* ohne Verbindung bleibt die Liste leer */ }
  }

  function persistThemeLocal(){
    try { window.localStorage.setItem(SETTINGS_KEY, JSON.stringify({ theme:settings.theme, showSyncStatus:settings.showSyncStatus })); }
    catch (e) { /* Theme-Speicherung ist nicht kritisch */ }
  }

  function applySyncStatusVisibility(){
    var el = document.getElementById('syncStatus');
    if (el) el.style.display = settings.showSyncStatus ? '' : 'none';
  }

  async function persistZustaendige(){
    try { await dbRef('zustaendige').set(settings.zustaendige); }
    catch (e) { showToast('Zuständige konnten nicht gespeichert werden — Internetverbindung prüfen'); }
  }

  function applyTheme(){
    document.documentElement.setAttribute('data-theme', settings.theme === 'dunkel' ? 'dark' : 'light');
  }

  function getZustaendigenOptions(){
    return settings.zustaendige.slice().sort(function(a,b){ return a.localeCompare(b,'de'); });
  }

  function maybeRunMigration(){
    if (migrationDone || !loaded || !ordersLoaded) return;
    migrationDone = true;
    syncManualOrdersAsGewonnen();
  }

  function syncManualOrdersAsGewonnen(){
    var leadsChanged = false;
    var ordersChanged = false;
    orders.forEach(function(o){
      if (o.leadId){
        var lead = leads.find(function(l){ return l.id === o.leadId; });
        if (lead && lead.status !== 'gewonnen'){
          lead.status = 'gewonnen';
          addHistory(lead, 'Status geändert: Gewonnen (automatisch synchronisiert aus Auftragsabwicklung)');
          leadsChanged = true;
        }
      } else {
        // Kein Lead verknüpft (älterer, manuell angelegter Auftrag) -> nachträglich anlegen
        var newLead = {
          id: uid(), name:o.kunde, kategorie:o.kategorie||'privat', fahrzeugtyp:o.fahrzeugtyp||'gebraucht',
          fahrzeug:o.fahrzeug, quelle:'sonstiges', status:'gewonnen',
          erstkontakt: o.erstelltAm ? o.erstelltAm.slice(0,10) : todayISO(), wiedervorlage:'', zustaendig:o.zustaendig||'',
          notizen:[], erstelltAm: o.erstelltAm || new Date().toISOString()
        };
        addHistory(newLead, 'Nachträglich angelegt zur Synchronisierung eines manuell erstellten Auftrags');
        leads.push(newLead);
        o.leadId = newLead.id;
        leadsChanged = true;
        ordersChanged = true;
      }
    });
    if (leadsChanged) persist();
    if (ordersChanged) persistOrders();
    if (leadsChanged || ordersChanged){
      render();
      if (currentView === 'auftraege') renderOrders();
    }
  }

  function addOrderHistory(order, text){
    order.notizen = order.notizen || [];
    order.notizen.unshift({ id: uid(), datum: new Date().toISOString(), text: text });
  }

  function addHistory(lead, text){
    lead.notizen = lead.notizen || [];
    lead.notizen.unshift({ id: uid(), datum: new Date().toISOString(), text: text });
  }

  function exportBackup(){
    var payload = { leads: leads, orders: orders, exportedAt: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'vertriebs-cockpit-backup-' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup heruntergeladen');
  }

  function importBackup(file){
    var reader = new FileReader();
    reader.onload = function(e){
      try {
        var data = JSON.parse(e.target.result);
        var newLeads, newOrders;
        if (Array.isArray(data)){
          // altes Format: nur Leads
          newLeads = data; newOrders = [];
        } else if (data && typeof data === 'object'){
          newLeads = Array.isArray(data.leads) ? data.leads : [];
          newOrders = Array.isArray(data.orders) ? data.orders : [];
        } else {
          throw new Error('ungültiges Format');
        }
        var hasExisting = leads.length || orders.length;
        var replace = hasExisting
          ? confirm('Bestehende Daten (' + leads.length + ' Leads, ' + orders.length + ' Aufträge) durch Backup ersetzen?\nAbbrechen = stattdessen zusammenführen.')
          : true;
        if (replace){
          leads = newLeads; orders = newOrders;
        } else {
          var existingLeadIds = new Set(leads.map(function(l){ return l.id; }));
          newLeads.forEach(function(l){ if (!existingLeadIds.has(l.id)) leads.push(l); });
          var existingOrderIds = new Set(orders.map(function(o){ return o.id; }));
          newOrders.forEach(function(o){ if (!existingOrderIds.has(o.id)) orders.push(o); });
        }
        persist();
        persistOrders();
        render();
        renderOrders();
        showToast('Backup importiert');
      } catch (err){
        showToast('Backup konnte nicht gelesen werden — falsches Format?');
      }
    };
    reader.readAsText(file);
  }

  function createOrderFromLead(lead, zahlungsart){
    var order = {
      id: uid(),
      leadId: lead.id,
      kunde: lead.name,
      kategorie: lead.kategorie || 'privat',
      fahrzeugtyp: lead.fahrzeugtyp || 'gebraucht',
      fahrzeug: lead.fahrzeug,
      zustaendig: lead.zustaendig,
      zahlungsart: zahlungsart || 'barkauf',
      eigenzulassung: false,
      inzahlungnahme: false,
      vertragVorhanden: false,
      bestellungUnterschrieben: false, bestellungUnterschriebenDatum:'',
      fahrzeugAngeliefert: false, fahrzeugAngeliefertDatum:'',
      werkstattauftragGeschrieben: false,
      fahrzeugZugelassen: false, fahrzeugZugelassenDatum:'',
      aufbereitet: false,
      zahlungseingangGeprueft: false,
      ankaufsvertragAusgedruckt: false,
      fahrzeugAusgeliefert: false, fahrzeugAusgeliefertDatum:'',
      stepAssignee: {},
      notizen: [],
      erstelltAm: new Date().toISOString()
    };
    addOrderHistory(order, 'Auftrag automatisch aus Lead "' + lead.name + '" angelegt');
    orders.unshift(order);
    persistOrders();
    return order;
  }

  function ensureOrderForLead(lead){
    var existing = orders.find(function(o){ return o.leadId === lead.id; });
    if (existing) return existing;
    return createOrderFromLead(lead, 'barkauf');
  }

  async function createLead(data, opts){
    opts = opts || {};
    var lead = {
      id: uid(),
      name: data.name.trim(),
      kategorie: data.kategorie || 'privat',
      fahrzeugtyp: data.fahrzeugtyp || 'gebraucht',
      fahrzeug: data.fahrzeug.trim(),
      quelle: data.quelle,
      erstkontakt: data.erstkontakt || todayISO(),
      status: data.status || 'neu',
      wiedervorlage: data.wiedervorlage || '',
      zustaendig: (data.zustaendig || '').trim(),
      notizen: [],
      erstelltAm: new Date().toISOString()
    };
    addHistory(lead, 'Lead angelegt (Quelle: ' + (QUELLEN[lead.quelle] || lead.quelle) + ')');
    if (data.notiz && data.notiz.trim()) addHistory(lead, data.notiz.trim());
    leads.unshift(lead);
    await persist();
    render();
    if (lead.status === 'gewonnen' && !opts.skipAutoOrder){
      ensureOrderForLead(lead);
      showToast('Lead angelegt — Auftrag in der Auftragsabwicklung erstellt');
    } else if (!opts.skipAutoOrder){
      showToast('Lead angelegt');
    }
  }

  async function updateLead(id, patch, historyText){
    var lead = leads.find(function(l){ return l.id === id; });
    if (!lead) return;
    Object.assign(lead, patch);
    if (historyText) addHistory(lead, historyText);
    await persist();
    render();
  }

  async function addNote(id, text){
    var lead = leads.find(function(l){ return l.id === id; });
    if (!lead || !text.trim()) return;
    addHistory(lead, text.trim());
    var rescheduled = false;
    if (lead.status !== 'gewonnen' && lead.status !== 'verloren'){
      lead.wiedervorlage = addDaysISO(todayISO(), STANDARD_WIEDERVORLAGE_TAGE);
      addHistory(lead, 'Wiedervorlage automatisch auf ' + fmtDate(lead.wiedervorlage) + ' gesetzt (' + STANDARD_WIEDERVORLAGE_TAGE + '-Tage-Rhythmus)');
      rescheduled = true;
    }
    await persist();
    render();
    showToast(rescheduled ? 'Notiz hinzugefügt — neue Wiedervorlage in ' + STANDARD_WIEDERVORLAGE_TAGE + ' Tagen' : 'Notiz hinzugefügt');
  }

  async function deleteLead(id){
    leads = leads.filter(function(l){ return l.id !== id; });
    if (expandedId === id) expandedId = null;
    await persist();
    render();
    showToast('Lead gelöscht');
  }

  async function clearAll(){
    if (!confirm('Wirklich ALLE Leads und Aufträge unwiderruflich löschen? Tipp: vorher ein Backup exportieren.')) return;
    leads = [];
    orders = [];
    expandedId = null;
    expandedOrderId = null;
    await persist();
    await persistOrders();
    render();
    if (currentView === 'auftraege') renderOrders();
    closeModal();
    showToast('Alle Daten gelöscht');

  // ---------- Rendering ----------
  function getFiltered(){
    return leads.filter(function(l){
      if (l.status === 'verloren') return false; // verlorene Leads werden ausgeblendet
      if (activeStatusFilter){
        if (l.status !== activeStatusFilter) return false;
      } else if (l.status === 'gewonnen') {
        return false; // gewonnene Leads verschwinden aus der Standardansicht
      }
      if (overdueOnly && !isOverdue(l)) return false;
      if (searchTerm){
        var hay = (l.name+' '+l.fahrzeug).toLowerCase();
        if (hay.indexOf(searchTerm.toLowerCase()) === -1) return false;
      }
      return true;
    }).sort(function(a,b){
      var aHas = a.wiedervorlage ? 0 : 1, bHas = b.wiedervorlage ? 0 : 1;
      if (aHas !== bHas) return aHas - bHas; // Leads mit Wiedervorlage immer zuerst
      if (a.wiedervorlage && b.wiedervorlage){
        var ao = isOverdue(a) ? 0 : 1, bo = isOverdue(b) ? 0 : 1;
        if (ao !== bo) return ao - bo;
        return a.wiedervorlage < b.wiedervorlage ? -1 : (a.wiedervorlage > b.wiedervorlage ? 1 : 0);
      }
      return b.erstelltAm.localeCompare(a.erstelltAm);
    });
  }

  function renderChips(){
    var counts = {};
    STATUS_ORDER.forEach(function(s){ counts[s] = 0; });
    leads.forEach(function(l){ counts[l.status] = (counts[l.status]||0) + 1; });
    var alleCount = leads.length - (counts.gewonnen || 0) - (counts.verloren || 0);
    var html = '<button class="chip' + (activeStatusFilter===''?' active':'') + '" data-status="">Alle (' + alleCount + ')</button>';
    STATUS_ORDER.filter(function(s){ return s !== 'verloren'; }).forEach(function(s){
      html += '<button class="chip' + (activeStatusFilter===s?' active':'') + '" data-status="' + s + '">' +
        '<span class="dot" style="background:' + STATUS[s].color + '"></span>' + STATUS[s].label + ' (' + counts[s] + ')</button>';
    });
    document.getElementById('statusChips').innerHTML = html;
    document.querySelectorAll('#statusChips .chip').forEach(function(btn){
      btn.addEventListener('click', function(){
        activeStatusFilter = btn.getAttribute('data-status');
        render();
      });
    });
  }

  function renderOverdueFlag(){
    var count = leads.filter(isOverdue).length;
    var el = document.getElementById('overdueFlag');
    if (count > 0){
      el.style.display = 'flex';
      el.innerHTML = '⏰ ' + count + ' fällige Wiedervorlage' + (count===1?'':'n');
      el.style.cursor = 'pointer';
      el.onclick = function(){ overdueOnly = !overdueOnly; render(); };
      el.style.outline = overdueOnly ? '2px solid var(--red)' : 'none';
    } else {
      el.style.display = 'none';
    }
  }

    return '<div class="field"><label>' + label + '</label><input type="' + type + '" data-field="' + key + '" value="' + escapeHtml(value||'') + '"></div>';

  function render(){
    renderChips();
    renderOverdueFlag();

    var wrap = document.getElementById('tableWrap');
    if (!loaded){
      wrap.innerHTML = '<div class="loading">Lade Leads …</div>';
      return;
    }
    var filtered = getFiltered();
    if (leads.length === 0){
      wrap.innerHTML = '<div class="empty"><h3>Noch keine Leads erfasst</h3>' +
        '<p>Leg deinen ersten Kontakt an, oder probier die Ansicht mit Testdaten aus.</p>' +
        '<div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">' +
        '<button class="btn btn-primary" id="emptyNew">+ Neuer Lead</button>' +
        '<button class="btn btn-ghost" id="emptyDemo">Testdaten einfügen</button></div></div>';
      document.getElementById('emptyNew').addEventListener('click', openNewModal);
      document.getElementById('emptyDemo').addEventListener('click', loadDemoData);
    } else if (filtered.length === 0){
      wrap.innerHTML = '<div class="empty"><h3>Keine Treffer</h3><p>Keine Leads entsprechen den aktuellen Filtern.</p></div>';
    } else {
      wrap.innerHTML =
        '<table><thead><tr>' +
          '<th>Status</th><th>Kunde</th><th>Fahrzeug</th><th>Quelle</th><th>Erstkontakt</th><th>Wiedervorlage</th><th></th>' +
        '</tr></thead><tbody>' + filtered.map(rowHtml).join('') + '</tbody></table>';

      document.querySelectorAll('tr.row').forEach(function(tr){
        tr.addEventListener('click', function(e){
          var id = tr.getAttribute('data-id');
          expandedId = (expandedId === id) ? null : id;
          render();
        });
      });
      var detailRow = wrap.querySelector('tr.detail-row');
      if (detailRow) wireDetail(detailRow);
    }

    document.getElementById('footerNote').innerHTML = '';
  }

  function wireDetail(detailRow){
    var id = detailRow.getAttribute('data-detail-for');
    detailRow.addEventListener('click', function(e){ e.stopPropagation(); });
    var saveBtn = detailRow.querySelector('[data-action="save"]');
    saveBtn.addEventListener('click', function(){
      var patch = {};
      detailRow.querySelectorAll('[data-field]').forEach(function(el){
        if (el.getAttribute('data-field') !== 'newnote') patch[el.getAttribute('data-field')] = el.value;
      });
      var lead = leads.find(function(l){ return l.id === id; });
      var statusChanged = lead && lead.status !== patch.status;
      var becameWon = statusChanged && patch.status === 'gewonnen';
      var becameLost = statusChanged && patch.status === 'verloren';
      var alreadyHasOrder = orders.some(function(o){ return o.leadId === id; });

      if (becameWon && !alreadyHasOrder){
        openWinModal(lead, patch);
        return;
      }

      var hist = statusChanged ? ('Status geändert: ' + STATUS[patch.status].label) : null;
      updateLead(id, patch, hist).then(function(){
        if (becameWon){
          var updatedLead = leads.find(function(l){ return l.id === id; });
          ensureOrderForLead(updatedLead);
        }
        showToast(becameLost ? 'Als verloren markiert' : 'Gespeichert');
      });
    });
    var noteBtn = detailRow.querySelector('[data-action="addnote"]');
    noteBtn.addEventListener('click', function(){
      var ta = detailRow.querySelector('[data-field="newnote"]');
      addNote(id, ta.value);
    });
    var delBtn = detailRow.querySelector('[data-action="delete"]');
    delBtn.addEventListener('click', function(){
      if (confirm('Diesen Lead unwiderruflich löschen?')) deleteLead(id);
    });
  }

        '</select></div>' +

          '<option value="false">Nein</option><option value="true">Ja</option>' +
        '</select></div>' +
        '<div class="field"><label>Inzahlungnahme</label><select id="wm_inzahlungnahme">' +
          '<option value="false">Nein</option><option value="true">Ja</option>' +
        '</select></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" id="wm_cancel">Abbrechen</button>' +
        '<button class="btn btn-primary" id="wm_save">Speichern &amp; Auftrag anlegen</button>' +
      '</div>' +
    '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
    document.getElementById('wm_cancel').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', function(e){ if (e.target.id === 'overlay') closeModal(); });
    document.getElementById('wm_save').addEventListener('click', function(){
      var zahlungsart = document.getElementById('wm_zahlungsart').value;
      var eigenzulassung = document.getElementById('wm_eigenzulassung').value === 'true';
      var inzahlungnahme = document.getElementById('wm_inzahlungnahme').value === 'true';
      var hist = 'Status geändert: ' + STATUS.gewonnen.label;
      updateLead(lead.id, patch, hist).then(function(){
        var updatedLead = leads.find(function(l){ return l.id === lead.id; });
        var order = createOrderFromLead(updatedLead, zahlungsart);
        order.eigenzulassung = eigenzulassung;
        order.inzahlungnahme = inzahlungnahme;
        persistOrders();
        closeModal();
        showToast('Gespeichert — Auftrag in "Auftragsabwicklung" angelegt');
      });
    });
  }

  function renameZustaendiger(oldName, newName){
    settings.zustaendige = settings.zustaendige.map(function(n){ return n === oldName ? newName : n; });
    persistZustaendige();
    var leadsChanged = false;
    leads.forEach(function(l){ if (l.zustaendig === oldName){ l.zustaendig = newName; leadsChanged = true; } });
    if (leadsChanged) persist();
    var ordersChanged = false;
    orders.forEach(function(o){ if (o.zustaendig === oldName){ o.zustaendig = newName; ordersChanged = true; } });
    if (ordersChanged) persistOrders();
  }

  function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

  // ---------- Auftragsabwicklung: Rendering ----------
  function relevantSteps(o){ return ORDER_STEPS.filter(function(s){ return s.relevant(o); }); }

  function computeOrderProgress(o){
    var steps = relevantSteps(o);
    var done = steps.filter(function(s){ return !!o[s.key]; }).length;
    return { done:done, total:steps.length, percent: steps.length ? Math.round(done/steps.length*100) : 0 };
  }

  function orderTag(o){
    if (o.fahrzeugAusgeliefert) return { label:'Ausgeliefert', cls:'tag-ausgeliefert' };
    if (o.aufbereitet && o.fahrzeugZugelassen && o.fahrzeugAngeliefert) return { label:'Bereit zur Auslieferung', cls:'tag-bereit' };
    return { label:'In Bearbeitung', cls:'tag-bearbeitung' };
  }

  function getFilteredOrders(){
    return orders.filter(function(o){
      if (computeOrderProgress(o).percent === 100) return false; // abgeschlossen -> aus der aktiven Liste ausblenden
      if (activeAuftragFilter && orderTag(o).label !== activeAuftragFilter) return false;
      if (auftragSearchTerm){
        var hay = (o.kunde + ' ' + o.fahrzeug).toLowerCase();
        if (hay.indexOf(auftragSearchTerm.toLowerCase()) === -1) return false;
      }
      return true;
    }).sort(function(a,b){ return b.erstelltAm.localeCompare(a.erstelltAm); });
  }

  function orderCustomerKey(o){
    return (o.kunde || '').trim().toLowerCase();
  }

  // Mehrere Fahrzeuge desselben Kunden (gleicher Name) zu einer Zeile zusammenfassen
  function groupOrdersByCustomer(list){
    var groups = {};
    var ordered = [];
    list.forEach(function(o){
      var key = orderCustomerKey(o);
      if (!groups[key]){
        groups[key] = { key:key, orders:[] };
        ordered.push(groups[key]);
      }
      groups[key].orders.push(o);
    });
    // 'list' ist bereits nach erstelltAm absteigend sortiert, daher entspricht die Reihenfolge
    // der Gruppen automatisch dem jeweils neuesten Fahrzeug des Kunden
    ordered.forEach(function(g){ g.kunde = g.orders[0].kunde; });
    return ordered;
  }

  function renderOrderChips(){
    var active = orders.filter(function(o){ return computeOrderProgress(o).percent !== 100; });
    var tags = ['In Bearbeitung','Bereit zur Auslieferung'];
    var counts = {}; tags.forEach(function(t){ counts[t] = 0; });
    active.forEach(function(o){ counts[orderTag(o).label]++; });
    var html = '<button class="chip' + (activeAuftragFilter===''?' active':'') + '" data-tag="">Alle (' + active.length + ')</button>';
    tags.forEach(function(t){
      html += '<button class="chip' + (activeAuftragFilter===t?' active':'') + '" data-tag="' + t + '">' + t + ' (' + counts[t] + ')</button>';
    });
    document.getElementById('auftragChips').innerHTML = html;
    document.querySelectorAll('#auftragChips .chip').forEach(function(btn){
      btn.addEventListener('click', function(){ activeAuftragFilter = btn.getAttribute('data-tag'); renderOrders(); });
    });
  }

  function orderVehicleRowHtml(o){
    var prog = computeOrderProgress(o);
    var tag = orderTag(o);
    return '<div class="auftrag-vehicle-row" data-vehicleoid="' + o.id + '">' +
      plateChip(o.fahrzeug) +
      '<span class="auftrag-tag tag-zahlung-' + (o.zahlungsart||'barkauf') + '">' + (ZAHLUNGSARTEN[o.zahlungsart] || o.zahlungsart) + '</span>' +
      '<span class="auftrag-tag ' + tag.cls + '">' + tag.label + '</span>' +
      '<div class="progress-wrap" style="flex:1;"><div class="progress-track">' +
        '<div class="progress-fill' + (prog.percent>=100?' done':'') + '" style="width:' + prog.percent + '%"></div></div>' +
        '<span class="progress-text">' + prog.done + '/' + prog.total + '</span></div>' +
    '</div>';
  }

  function orderRowHtml(g){
    var extraCount = g.orders.length - 1;
    var main = g.orders[0]; // neuestes Fahrzeug dieses Kunden
    var prog = computeOrderProgress(main);
    var tag = orderTag(main);
    var open = extraCount > 0 && expandedOrderId === g.key;
    var row =
      '<tr class="row" data-gkey="' + escapeHtml(g.key) + '">' +
        '<td data-label="Kunde"><div class="kunde-name">' + escapeHtml(g.kunde) +
          (extraCount > 0 ? '<span class="kunde-extra-badge">+' + extraCount + '</span>' : '') +
          ' <span class="auftrag-tag ' + (main.kategorie==='gewerbe'?'tag-gewerbe':'tag-privat') + '" style="margin-left:4px; vertical-align:middle;">' + (main.kategorie==='gewerbe'?'Gewerbe':'Privat') + '</span>' +
          ' <span class="auftrag-tag ' + fahrzeugtypTagClass(main.fahrzeugtyp) + '" style="margin-left:2px; vertical-align:middle;">' + (FAHRZEUGTYPEN[main.fahrzeugtyp] || 'Gebrauchtwagen') + '</span></div></td>' +
        '<td data-label="Fahrzeug">' + plateChip(main.fahrzeug) + '</td>' +
        '<td data-label="Zahlungsart"><span class="auftrag-tag tag-zahlung-' + (main.zahlungsart||'barkauf') + '">' + (ZAHLUNGSARTEN[main.zahlungsart] || main.zahlungsart) + '</span></td>' +
        '<td data-label="Status"><span class="auftrag-tag ' + tag.cls + '">' + tag.label + '</span></td>' +
        '<td data-label="Fortschritt"><div class="progress-wrap"><div class="progress-track">' +
          '<div class="progress-fill' + (prog.percent>=100?' done':'') + '" style="width:' + prog.percent + '%"></div></div>' +
          '<span class="progress-text">' + prog.done + '/' + prog.total + '</span></div></td>' +
        '<td style="width:24px"><span class="chevron' + (open?' open':'') + '">›</span></td>' +
      '</tr>';
    if (open){
      row += '<tr class="detail-row"><td colspan="6"><div class="auftrag-vehicles-panel">' +
        g.orders.map(orderVehicleRowHtml).join('') +
      '</div></td></tr>';
    }
    return row;
  }
